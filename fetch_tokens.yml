name: Fetch Solana Pulse Tokens

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Also auto-refresh every 6 hours
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour max (well within free tier 6h limit)

    permissions:
      contents: write  # needed to commit tokens.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run token fetcher
        run: python fetch_tokens.py

      - name: Commit updated tokens.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tokens.json
          git diff --cached --quiet || git commit -m "chore: refresh tokens snapshot [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
